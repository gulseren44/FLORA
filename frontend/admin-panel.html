<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora - Yönetici Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="font-family: sans-serif; background-color: #f9f9f9; margin: 0; padding: 20px;">

    <div style="max-width: 1200px; margin: 30px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2e7d32; padding-bottom: 10px; margin-bottom: 20px;">
            <h2 style="color: #2e7d32; margin: 0;">🛠️ Flora Yönetici Yönetim Paneli</h2>
            <button id="admin-logout" style="padding: 6px 12px; background: #d32f2f; color: white; border: none; cursor: pointer; font-weight: bold;">Çıkış Yap</button>
        </div>

        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
            
            <div style="flex: 1; min-width: 350px; border-right: 1px solid #eee; padding-right: 20px;">
                <h3 id="form-title" style="color: #333; margin-top: 0;">🌿 Yeni Ürün Ekle</h3>
                <form id="add-product-form">
                    <input type="hidden" id="edit-prod-id" value="">

                    <div style="margin-bottom: 12px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Ürün Adı:</label>
                        <input type="text" id="prod-name" required placeholder="Örn: Salon Palmiyesi" style="width: 100%; padding: 8px; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Bilimsel Adı:</label>
                        <input type="text" id="prod-scientific" placeholder="Örn: Chamaedorea elegans" style="width: 100%; padding: 8px; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Fiyat (TL):</label>
                        <input type="number" step="0.01" id="prod-price" required placeholder="Örn: 195.50" style="width: 100%; padding: 8px; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Kategori:</label>
                        <select id="prod-category" required style="width: 100%; padding: 8px; box-sizing: border-box;">
                            <option value="1">İç Mekan Bitkileri</option>
                            <option value="2">Dış Mekan Bitkileri</option>
                            <option value="3">Sukulentler</option>
                            <option value="4">Aksesuarlar</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Görsel URL:</label>
                        <input type="text" id="prod-image" placeholder="https://images.unsplash.com/..." style="width: 100%; padding: 8px; box-sizing: border-box;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Açıklama:</label>
                        <textarea id="prod-desc" rows="3" placeholder="Bakım önerileri..." style="width: 100%; padding: 8px; box-sizing: border-box; resize: vertical;"></textarea>
                    </div>
                    
                    <button type="submit" id="form-submit-btn" style="width: 100%; padding: 10px; background: #2e7d32; color: white; border: none; font-weight: bold; cursor: pointer;">Ürünü Veritabanına Kaydet 🚀</button>
                    <button type="button" id="cancel-edit-btn" style="width: 100%; padding: 8px; background: #95a5a6; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 8px; display: none;">Düzenlemeyi İptal Et ❌</button>
                </form>
            </div>

            <div style="flex: 1.5; min-width: 450px;">
                <h3 style="color: #333; margin-top: 0;">📦 Mevcut Ürünler ve Yönetim</h3>
                <div style="max-height: 500px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                        <thead style="background: #f2f2f2; position: sticky; top: 0;">
                            <tr>
                                <th style="padding: 10px; border-bottom: 1px solid #ddd;">Görsel</th>
                                <th style="padding: 10px; border-bottom: 1px solid #ddd;">Ürün Adı</th>
                                <th style="padding: 10px; border-bottom: 1px solid #ddd;">Fiyat</th>
                                <th style="padding: 10px; border-bottom: 1px solid #ddd; text-align: center;">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="admin-product-list">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:8085/api/products";
        let allProductsLocal = []; // Sayfadaki verileri hafızada tutmak için dizi

        if (localStorage.getItem("is_admin") !== "true") {
            alert("Bu sayfaya erişim yetkiniz yok!");
            window.location.href = "admin-login.html";
        }

        document.getElementById("admin-logout").addEventListener("click", () => {
            localStorage.removeItem("is_admin");
            window.location.href = "admin-login.html";
        });

        document.addEventListener("DOMContentLoaded", fetchAdminProducts);

        // --- VERİLERİ TABLOYA LİSTELEME ---
        function fetchAdminProducts() {
            fetch(API_URL)
                .then(res => res.json())
                .then(products => {
                    allProductsLocal = products; // Gelen veriyi yerel diziye kaydet
                    const tbody = document.getElementById("admin-product-list");
                    tbody.innerHTML = "";

                    if (products.length === 0) {
                        tbody.innerHTML = "<tr><td colspan='4' style='padding:20px; text-align:center; color:#888;'>Veritabanında ürün bulunmuyor.</td></tr>";
                        return;
                    }

                    products.forEach(p => {
                        const row = `
                            <tr style="border-bottom: 1px solid #eee;">
                                <td style="padding: 8px;"><img src="${p.imageUrl || 'https://via.placeholder.com/40'}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;"></td>
                                <td style="padding: 8px;"><strong>${p.name}</strong><br><small style="color:#777;">${p.scientificName || ''}</small></td>
                                <td style="padding: 8px;">₺${p.price.toFixed(2)}</td>
                                <td style="padding: 8px; text-align: center;">
                                    <button onclick="startEdit(${p.id})" style="padding: 5px 10px; background: #f39c12; color: white; border: none; cursor: pointer; border-radius: 4px; margin-right: 5px;">Düzenle ✏️</button>
                                    <button onclick="deleteProduct(${p.id}, '${p.name}')" style="padding: 5px 10px; background: #e74c3c; color: white; border: none; cursor: pointer; border-radius: 4px;">Sil 🗑️</button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                })
                .catch(err => console.error("Ürün listesi çekilemedi:", err));
        }

        // --- DÜZENLEME MODUNU BAŞLATAN FONKSİYON ---
        function startEdit(id) {
            // İlgili ürünü yerel diziden tık diye buluyoruz (Backend'e tekrar sormaya gerek yok)
            const product = allProductsLocal.find(p => p.id === id);
            
            if (product) {
                // Form alanlarını seçilen ürünün bilgileriyle dolduruyoruz
                document.getElementById("edit-prod-id").value = product.id;
                document.getElementById("prod-name").value = product.name;
                document.getElementById("prod-scientific").value = product.scientificName || "";
                document.getElementById("prod-price").value = product.price;
                document.getElementById("prod-category").value = product.category ? product.category.id : "1";
                document.getElementById("prod-image").value = product.imageUrl || "";
                document.getElementById("prod-desc").value = product.description || "";

                // Formun kimliğini "Güncelleme Modu" yapıyoruz
                document.getElementById("form-title").innerText = "✏️ Ürünü Düzenle";
                document.getElementById("form-submit-btn").innerText = "Değişiklikleri Kaydet 💾";
                document.getElementById("form-submit-btn").style.background = "#f39c12";
                document.getElementById("cancel-edit-btn").style.display = "block"; // İptal butonunu aç
            }
        }

        // --- DÜZENLEMEYİ İPTAL ETME ---
        document.getElementById("cancel-edit-btn").addEventListener("click", resetFormState);

        function resetFormState() {
            document.getElementById("add-product-form").reset();
            document.getElementById("edit-prod-id").value = "";
            document.getElementById("form-title").innerText = "🌿 Yeni Ürün Ekle";
            document.getElementById("form-submit-btn").innerText = "Ürünü Veritabanına Kaydet 🚀";
            document.getElementById("form-submit-btn").style.background = "#2e7d32";
            document.getElementById("cancel-edit-btn").style.display = "none";
        }

        // --- ORTAK FORM SUBMIT MOTORU (HEM EKLEME HEM GÜNCELLEME YAPAR) ---
        document.getElementById("add-product-form").addEventListener("submit", (e) => {
            e.preventDefault();

            const editId = document.getElementById("edit-prod-id").value;

            const productData = {
                name: document.getElementById("prod-name").value.trim(),
                scientificName: document.getElementById("prod-scientific").value.trim() || null,
                price: parseFloat(document.getElementById("prod-price").value),
                imageUrl: document.getElementById("prod-image").value.trim() || null,
                description: document.getElementById("prod-desc").value.trim() || null,
                category: { id: parseInt(document.getElementById("prod-category").value) }
            };

            // EĞER editId VARSA UPDATE (PUT) YAPACAĞIZ, YOKSA NEW PRODUCT (POST) YAPACAĞIZ
            const isEditMode = editId !== "";
            const requestUrl = isEditMode ? `${API_URL}/${editId}` : API_URL;
            const requestMethod = isEditMode ? "PUT" : "POST";

            fetch(requestUrl, {
                method: requestMethod,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(productData)
            })
            .then(res => {
                if (!res.ok) throw new Error("İşlem başarısız.");
                return res.json();
            })
            .then(data => {
                alert(isEditMode ? `"${data.name}" başarıyla güncellendi! 💾` : `"${data.name}" başarıyla eklendi! 🎉`);
                resetFormState(); // Formu eski temiz haline getir
                fetchAdminProducts(); // Tabloyu canlı yenile
            })
            .catch(err => alert("İşlem sırasında bir hata oluştu!"));
        });

        // --- ÜRÜN SİLME ---
        function deleteProduct(id, name) {
            if (confirm(`"${name}" ürününü silmek istediğinize emin misiniz?`)) {
                fetch(`${API_URL}/${id}`, { method: "DELETE" })
                .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                .then(() => { alert("Ürün silindi."); fetchAdminProducts(); })
                .catch(() => alert("Silme hatası!"));
            }
        }
    </script>
</body>
</html>
